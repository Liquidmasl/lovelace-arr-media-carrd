name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          # Strip leading 'v' to match CHANGELOG headings like [1.2.0]
          VER="${VERSION#v}"
          awk "/^## \[${VER}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > /tmp/release_notes.md
          if [ ! -s /tmp/release_notes.md ]; then
            echo "No changelog entry found for ${VERSION}" > /tmp/release_notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          files: dist/arr-media-carrd.js

      - name: HACS validation
        uses: hacs/action@22.5.0
        with:
          category: plugin
